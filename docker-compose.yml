version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: espressolens_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: espressolens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d espressolens"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: espressolens_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s  # Gives Windows 15 seconds to boot up before checking

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: espressolens_backend
    restart: always
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/espressolens
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=development
      - PROJECT_NAME=EspressoLens API
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: espressolens_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true # Helps hot-reload work reliably in Docker on Windows/WSL
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
